<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz – Host</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-dark: #46178F;
      --purple: #8B2FC9;
      --red:    #E21B3C;
      --blue:   #1368CE;
      --yellow: #D89E00;
      --green:  #26890C;
      --white:  #ffffff;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple));
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Screens ─────────────────────────────────────────────────────────── */
    .screen { display: none; width: 100%; max-width: 860px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; gap: 24px; }

    /* ── Lobby ───────────────────────────────────────────────────────────── */
    .pin-box {
      background: var(--white);
      color: var(--purple-dark);
      border-radius: 16px;
      padding: 24px 48px;
      text-align: center;
    }
    .pin-box .label { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; opacity: .6; }
    .pin-box .pin   { font-size: 4rem; font-weight: 900; letter-spacing: 8px; }
    .pin-box .url   { font-size: .85rem; opacity: .5; margin-top: 4px; }

    .player-list {
      background: rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 20px 28px;
      width: 100%;
      min-height: 80px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
    }
    .player-chip {
      background: rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 6px 16px;
      font-weight: 700;
      font-size: .95rem;
      animation: pop .2s ease;
    }
    @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Question ────────────────────────────────────────────────────────── */
    .timer-bar-wrap {
      width: 100%;
      height: 14px;
      background: rgba(255,255,255,.2);
      border-radius: 999px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: var(--white);
      border-radius: 999px;
      transition: width 1s linear, background .3s;
    }
    .timer-bar.urgent { background: #ff4444; }

    .q-meta {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: .9rem;
      opacity: .75;
    }

    .question-text {
      background: rgba(255,255,255,.15);
      border-radius: 16px;
      padding: 28px 36px;
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      font-weight: 800;
      text-align: center;
      width: 100%;
      line-height: 1.3;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }
    .answer-btn {
      border: none;
      border-radius: 12px;
      padding: 22px 18px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      cursor: default;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity .3s;
    }
    .answer-btn .shape { font-size: 1.4rem; flex-shrink: 0; }
    .answer-btn:nth-child(1) { background: var(--red); }
    .answer-btn:nth-child(2) { background: var(--blue); }
    .answer-btn:nth-child(3) { background: var(--yellow); }
    .answer-btn:nth-child(4) { background: var(--green); }
    .answer-btn.wrong { opacity: .35; }
    .answer-btn.correct { outline: 4px solid var(--white); }

    .question-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      background: rgba(255,255,255,.9);
    }

    .answer-counter {
      font-size: 1.1rem;
      opacity: .8;
    }

    /* ── Leaderboard ─────────────────────────────────────────────────────── */
    .leaderboard { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .lb-row {
      background: rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 1.15rem;
      font-weight: 700;
      animation: slideIn .3s ease both;
    }
    .lb-row:nth-child(1) { background: rgba(255,215,0,.35); font-size: 1.35rem; }
    .lb-row:nth-child(2) { background: rgba(192,192,192,.3); }
    .lb-row:nth-child(3) { background: rgba(205,127,50,.3); }
    @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .lb-row .rank { width: 32px; text-align: center; font-size: 1.3em; }
    .lb-row .lb-name { flex: 1; }
    .lb-row .lb-score { opacity: .8; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      background: var(--white);
      color: var(--purple-dark);
      border: none;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .1s, opacity .2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn:hover  { transform: scale(1.04); }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: default; transform: none; }

    h1 { font-size: 2rem; font-weight: 900; text-align: center; }
    h2 { font-size: 1.5rem; font-weight: 800; text-align: center; }

    /* ── Live PIN badge ─────────────────────────────────────────────────────── */
    #pin-badge {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,.35);
      border-radius: 14px;
      padding: 10px 18px;
      text-align: center;
      z-index: 999;
      pointer-events: none;
      line-height: 1.3;
    }
    #pin-badge .pb-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .7;
    }
    #pin-badge .pb-pin {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 5px;
    }
    #pin-badge .pb-url {
      font-size: .6rem;
      opacity: .5;
      margin-top: 2px;
    }

    /* ── Explanation ─────────────────────────────────────────────────────── */
    .explanation-box {
      background: rgba(255,255,255,.12);
      border-left: 4px solid rgba(255,255,255,.45);
      border-radius: 12px;
      padding: 16px 22px;
      font-size: .95rem;
      line-height: 1.5;
      width: 100%;
      text-align: left;
    }

    /* ── VAR hint overlay ────────────────────────────────────────────────── */
    #var-hint {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.85);
      color: #4ade80;
      font-size: 1.4rem;
      font-weight: 900;
      padding: 18px 32px;
      border-radius: 14px;
      border: 2px solid #4ade80;
      z-index: 9999;
      text-align: center;
      pointer-events: none;
      letter-spacing: .5px;
    }
    #var-hint .var-label {
      font-size: .7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <!-- VAR hint overlay -->
  <div id="var-hint"><div class="var-label">📹 VAR Check</div><div id="var-hint-text"></div></div>

  <!-- Live PIN badge (shown during gameplay for rejoins / hot-joins) -->
  <div id="pin-badge">
    <div class="pb-label">Game PIN</div>
    <div class="pb-pin" id="pb-pin-display">----</div>
    <div class="pb-url">player.html</div>
  </div>

  <!-- LOBBY -->
  <div id="screen-lobby" class="screen active">
    <h1>Quiz – Host</h1>
    <div class="pin-box">
      <div class="label">Game PIN</div>
      <div class="pin" id="pin-display">----</div>
      <div class="url" id="url-display" style="display:none"></div>
    </div>
    <div id="qr-wrap" style="display:flex;flex-direction:column;align-items:center;gap:10px;margin:16px 0">
      <div id="qr-code" style="background:#fff;padding:12px;border-radius:12px;display:inline-block"></div>
      <div style="font-size:.85rem;opacity:.6">Scan QR code → go to player.html</div>
    </div>
    <div class="player-list" id="player-list">
      <span style="opacity:.5">Waiting for players…</span>
    </div>
    <button class="btn" id="btn-start" disabled>Start game</button>
    <button class="btn" id="btn-resume" style="display:none;background:rgba(255,255,255,.7)">Resume game</button>
    <button class="btn" id="btn-kick-all" style="display:none;background:rgba(226,27,60,.75);margin-top:4px">Kick all players</button>
  </div>

  <!-- QUESTION -->
  <div id="screen-question" class="screen">
    <div class="timer-bar-wrap" style="width:100%">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
    <div class="q-meta">
      <span id="q-counter"></span>
      <span id="timer-display"></span>
    </div>
    <img id="question-image" class="question-image" style="display:none" referrerpolicy="no-referrer" />
    <div class="question-text" id="question-text"></div>
    <div class="answer-grid" id="answer-grid"></div>
    <div class="answer-counter" id="answer-counter">0 / 0 answered</div>
  </div>

  <!-- RESULT (after each question) -->
  <div id="screen-result" class="screen">
    <h2 id="result-title">Result</h2>
    <img id="result-image" class="question-image" style="display:none" referrerpolicy="no-referrer" />
    <div class="answer-grid" id="result-grid"></div>
    <div class="explanation-box" id="result-explanation" style="display:none"></div>
    <button class="btn" id="btn-next">Next</button>
  </div>

  <!-- TOP 5 (every 5 questions) -->
  <div id="screen-top5" class="screen">
    <h1>🏅 Top 5</h1>
    <div class="leaderboard" id="top5-leaderboard"></div>
    <button class="btn" id="btn-top5-next">Next</button>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="screen">
    <h1>🏆 Final Results</h1>
    <div class="leaderboard" id="final-leaderboard"></div>
    <button class="btn" id="btn-restart">New game</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- PIN display & QR code – runs immediately, no module system needed -->
  <script>
    (function () {
      function genPin() {
        return Array.from({ length: 6 }, () => Math.floor(Math.random() * 10)).join('');
      }
      const stored = localStorage.getItem('quiz-host-pin');
      const pin    = (stored && /^\d+$/.test(stored)) ? stored : genPin();
      localStorage.setItem('quiz-host-pin', pin);

      document.getElementById('pin-display').textContent = pin;
      document.getElementById('pb-pin-display').textContent = pin;

      const joinUrl = location.href.replace('host.html', 'player.html');
      document.getElementById('url-display').textContent = joinUrl;

      const qrWrap = document.getElementById('qr-code');
      new QRCode(qrWrap, {
        text:         joinUrl,
        width:        180,
        height:       180,
        colorDark:    '#000000',
        colorLight:   '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    })();
  </script>

    // ── UI ────────────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('pin-badge').style.display = (id === 'screen-lobby') ? 'none' : 'block';
    }

    function getLeaderboard() {
      return [...state.players.values()]
        .sort((a, b) => b.score - a.score)
        .map((p, i) => ({ rank: i + 1, name: p.name, score: p.score, correct: p.correct, delta: p.lastDelta }));
    }

    function buildLeaderboard(containerId, lb, limit = 8) {
      const el = document.getElementById(containerId);
      el.innerHTML = '';
      lb.slice(0, limit).forEach((entry, i) => {
        const row = document.createElement('div');
        row.className = 'lb-row';
        row.style.animationDelay = `${i * 80}ms`;
        const medal = entry.rank === 1 ? '🥇' : entry.rank === 2 ? '🥈' : entry.rank === 3 ? '🥉' : entry.rank + '.';
        const deltaHtml = entry.delta > 0
          ? ` <span style="color:#4ade80;font-size:.85em;margin-left:4px">+${entry.delta}</span>`
          : '';
        row.innerHTML = `<span class="rank">${medal}</span><span class="lb-name">${entry.name}</span>${deltaHtml}<span class="lb-score">${entry.score} pts</span>`;
        el.appendChild(row);
      });
    }

    function updatePlayerList() {
      const list = document.getElementById('player-list');
      list.innerHTML = '';
      if (state.players.size === 0) {
        list.innerHTML = '<span style="opacity:.5">Waiting for players…</span>';
      } else {
        state.players.forEach(p => {
          const chip = document.createElement('span');
          chip.className = 'player-chip';
          const _ln = p.name.toLowerCase();
          if (_ln === 'messi') {
            chip.textContent = p.name + ' 🐐';
          } else if (_ln === 'pelé' || _ln === 'pele') {
            chip.style.cssText = 'background:rgba(255,215,0,.55);color:#46178F';
            chip.textContent = p.name;
          } else {
            chip.textContent = p.name;
          }
          list.appendChild(chip);
        });
      }
      document.getElementById('btn-start').disabled = state.players.size === 0;
      document.getElementById('btn-kick-all').style.display = state.players.size === 0 ? 'none' : '';
    }

    function updateAnswerCounter() {
      const answered = [...state.players.values()].filter(p => p.answered).length;
      document.getElementById('answer-counter').textContent = `${answered} / ${state.players.size} answered`;
    }

    // ── Timer ─────────────────────────────────────────────────────────────────
    function startTimer(seconds) {
      clearInterval(state.timerInterval);
      state.timeLeft  = seconds;
      state.totalTime = seconds;
      updateTimerUI();
      state.timerInterval = setInterval(() => {
        state.timeLeft--;
        updateTimerUI();
        if (state.timeLeft <= 0) {
          clearInterval(state.timerInterval);
          console.log('[timer] Zeit abgelaufen → revealAnswer()');
          revealAnswer();
        }
      }, 1000);
    }

    function updateTimerUI() {
      const pct = (state.timeLeft / state.totalTime) * 100;
      const bar = document.getElementById('timer-bar');
      bar.style.width = pct + '%';
      bar.classList.toggle('urgent', state.timeLeft <= 5);
      document.getElementById('timer-display').textContent = state.timeLeft + 's';
    }

    // ── Firebase communication ─────────────────────────────────────────────
    function broadcast(data) {
      if (!state.broadcastRef) return;
      state._lastBroadcastTs = Math.max(Date.now(), (state._lastBroadcastTs || 0) + 1);
      state.broadcastRef.set({ ...data, _ts: state._lastBroadcastTs });
    }

    function initFirebase() {
      const pin = localStorage.getItem('quiz-host-pin');
      state.pin          = pin;
      state.gameRef      = db.ref('games/' + pin);
      state.playersRef   = db.ref('games/' + pin + '/players');
      state.broadcastRef = db.ref('games/' + pin + '/broadcast');

      // Mark game as open + clean up stale data from previous sessions
      state.gameRef.update({ status: 'lobby', pin });
      state.broadcastRef.remove();
      state.playersRef.remove();

      // Listen for players joining / updating answers
      state.playersRef.on('child_added', snap => {
        const uid  = snap.key;
        const data = snap.val();
        if (!data || !data.name) return;
        const saved = state.savedScores.get(data.name);
        if (!state.players.has(uid)) {
          state.players.set(uid, {
            uid,
            name:        data.name,
            score:       saved ? saved.score   : 0,
            correct:     saved ? saved.correct : 0,
            answered:    false,
            lastAnswer:  -1,
            lastTimeLeft: 0,
            lastDelta:   0,
            lastEstimate: null,
          });
          updatePlayerList();
        }
      });

      state.playersRef.on('child_changed', snap => {
        const uid  = snap.key;
        const data = snap.val();
        console.log('[child_changed]', uid, JSON.stringify(data), '| host qIndex:', state.qIndex, '| revealed:', state.revealed);
        if (!data) return;

        const p = state.players.get(uid);
        if (!p) { console.warn('[child_changed] unknown uid', uid); return; }

        // Handle answer submission
        if (data.answerPending) {
          console.log('[child_changed] answerPending=true | data.qIdx:', data.qIdx, '(type:', typeof data.qIdx, ') | state.qIndex:', state.qIndex, '(type:', typeof state.qIndex, ') | p.answered:', p.answered, '| revealed:', state.revealed);
        }
        if (data.answerPending && Number(data.qIdx) === state.qIndex && !p.answered && !state.revealed) {
          p.answered     = true;
          p.lastTimeLeft = data.timeRemaining || 0;
          if (data.estimate !== undefined && data.estimate !== null) {
            p.lastEstimate = data.estimate;
            p.lastAnswer   = -1;
          } else {
            p.lastAnswer   = data.answerIndex;
            p.lastEstimate = null;
          }
          updateAnswerCounter();
          const answered = [...state.players.values()].filter(x => x.answered).length;
          console.log('[child_changed] accepted answer, answered:', answered, '/', state.players.size);
          if (state.players.size > 0 && answered >= state.players.size) revealAnswer();
        }
      });

      state.playersRef.on('child_removed', snap => {
        state.players.delete(snap.key);
        updatePlayerList();
        // If a player left while everyone else had already answered, reveal now
        if (!state.revealed && state.players.size > 0) {
          const answered = [...state.players.values()].filter(x => x.answered).length;
          if (answered >= state.players.size) revealAnswer();
        }
      });

      console.log('Host bereit, PIN:', pin);
    }

    // ── Game ──────────────────────────────────────────────────────────────────
    function saveGameState() {
      localStorage.setItem('quiz-game-state', JSON.stringify({
        ts: Date.now(),
        questions: state.questions,
        nextQIndex: state.qIndex + 1,
        playerScores: [...state.players.values()].map(p => ({ name: p.name, score: p.score, correct: p.correct })),
      }));
    }

    function clearGameState() {
      localStorage.removeItem('quiz-game-state');
    }

    function showCurrentQuestion() {
      state.revealed = false;
      const q = state.questions[state.qIndex];
      const qtype = q.type || 'multiple';
      state.players.forEach(p => { p.answered = false; p.lastAnswer = -1; p.lastDelta = 0; p.lastEstimate = null; });

      showScreen('screen-question');
      document.getElementById('q-counter').textContent      = `Question ${state.qIndex + 1} / ${state.questions.length}`;
      document.getElementById('question-text').textContent  = q.question;
      document.getElementById('answer-counter').textContent = `0 / ${state.players.size} answered`;

      const imgEl = document.getElementById('question-image');
      if (qtype === 'image' && q.image) { imgEl.src = q.image; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; imgEl.src = ''; }

      const grid = document.getElementById('answer-grid');
      grid.innerHTML = '';
      if (qtype === 'estimate') {
        const info = document.createElement('div');
        info.style.cssText = 'grid-column:1/-1;background:rgba(255,255,255,.15);border-radius:12px;padding:28px;text-align:center;font-size:1.3rem;font-weight:700';
        info.textContent = '🔢 Players are typing their estimates…';
        grid.appendChild(info);
      } else {
        const icons = SHAPES;
        q.options.forEach((opt, i) => {
          const btn = document.createElement('div');
          btn.className = 'answer-btn';
          btn.innerHTML = `<span class="shape">${icons[i]}</span>${opt}`;
          grid.appendChild(btn);
        });
      }

      broadcast({ type: 'question', index: state.qIndex, total: state.questions.length, question: q.question, options: q.options || [], timeLimit: q.timeLimit, qtype, image: q.image || null, _startedAt: Date.now() });
      startTimer(q.timeLimit);
    }

    function revealAnswer() {
      console.log('[revealAnswer] called | revealed:', state.revealed, '| qIndex:', state.qIndex);
      if (state.revealed) return;
      state.revealed = true;
      clearInterval(state.timerInterval);

      const q     = state.questions[state.qIndex];
      const qtype = q.type || 'multiple';
      state.players.forEach(p => {
        if (!p.answered) { p.lastDelta = 0; return; }
        if (qtype === 'estimate') {
          if (p.lastEstimate === null || p.lastEstimate === undefined) {
            p.lastDelta = 0;
          } else {
            const diff = Math.abs(p.lastEstimate - q.correctAnswer);
            const [b0, b1, b2] = q.brackets || [0, 0, 0];
            let mult = 0;
            if      (diff <= b0) mult = 1.00;
            else if (diff <= b1) mult = 0.50;
            else if (diff <= b2) mult = 0.25;
            if (mult > 0) {
              const timePts = Math.round(MAX_PTS * (p.lastTimeLeft / q.timeLimit));
              const pts     = Math.max(MIN_PTS, Math.round(timePts * mult));
              p.score  += pts;
              p.correct++;
              p.lastDelta = pts;
            } else {
              p.lastDelta = 0;
            }
          }
        } else {
          if (p.lastAnswer === q.correctIndex) {
            const pts = Math.max(MIN_PTS, Math.round(MAX_PTS * (p.lastTimeLeft / q.timeLimit)));
            p.score  += pts;
            p.correct++;
            p.lastDelta = pts;
          } else {
            p.lastDelta = 0;
          }
        }
      });

      const lb = getLeaderboard();
      broadcast({ type: 'reveal', correctIndex: q.correctIndex ?? null, correctAnswer: q.correctAnswer ?? null, unit: q.unit || '', qtype, explanation: q.explanation ?? '', leaderboard: lb });

      showScreen('screen-result');
      const resultImgEl = document.getElementById('result-image');
      if (qtype === 'image' && q.image) { resultImgEl.src = q.image; resultImgEl.style.display = 'block'; }
      else { resultImgEl.style.display = 'none'; resultImgEl.src = ''; }

      const resultGrid = document.getElementById('result-grid');
      resultGrid.innerHTML = '';
      if (qtype === 'estimate') {
        const correctDiv = document.createElement('div');
        correctDiv.style.cssText = 'grid-column:1/-1;background:rgba(38,137,12,.4);border-radius:12px;padding:20px;text-align:center;font-size:1.8rem;font-weight:900';
        correctDiv.textContent = `✅ ${q.unit ? q.correctAnswer.toLocaleString() : q.correctAnswer}${q.unit ? ' ' + q.unit : ''}`;
        resultGrid.appendChild(correctDiv);
        const guesses = [...state.players.values()]
          .filter(p => p.lastEstimate !== null && p.lastEstimate !== undefined)
          .sort((a, b) => b.lastDelta - a.lastDelta || Math.abs(a.lastEstimate - q.correctAnswer) - Math.abs(b.lastEstimate - q.correctAnswer));
        if (guesses.length > 0) {
          const guessWrap = document.createElement('div');
          guessWrap.style.cssText = 'grid-column:1/-1;display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto';
          guesses.forEach(g => {
            const diff = Math.abs(g.lastEstimate - q.correctAnswer);
            const icon = g.lastDelta > 0 ? '🎯' : '❌';
            const row  = document.createElement('div');
            row.style.cssText = 'display:flex;justify-content:space-between;background:rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;font-size:.95rem';
            row.innerHTML = `<span>${g.name}</span><span>${q.unit ? g.lastEstimate.toLocaleString() : g.lastEstimate} <span style="opacity:.6;font-size:.85em">(${diff > 0 ? '+/−' + (q.unit ? diff.toLocaleString() : diff) : 'exact'})</span> ${icon}</span>`;
            guessWrap.appendChild(row);
          });
          resultGrid.appendChild(guessWrap);
        }
      } else {
        const icons = SHAPES;
        (q.options || []).forEach((opt, i) => {
          const div = document.createElement('div');
          div.className = `answer-btn ${i === q.correctIndex ? 'correct' : 'wrong'}`;
          div.innerHTML = `<span class="shape">${icons[i]}</span>${opt}`;
          resultGrid.appendChild(div);
        });
      }

      const isLast       = state.qIndex >= state.questions.length - 1;
      const isTop5Moment = !isLast && (state.qIndex + 1) % 5 === 0;
      if (isLast) { clearGameState(); } else { saveGameState(); }
      document.getElementById('result-title').textContent = isLast ? 'Final Standings' : (qtype === 'estimate' ? 'Correct Estimate' : 'Correct Answer');

      const explEl = document.getElementById('result-explanation');
      if (q.explanation) { explEl.textContent = '💡 ' + q.explanation; explEl.style.display = ''; }
      else { explEl.style.display = 'none'; }

      const nextBtn = document.getElementById('btn-next');
      nextBtn.disabled = false;
      nextBtn.textContent = isLast ? 'Show final standings' : (isTop5Moment ? '🏅 Show Top 5' : 'Next question');
      const advance = isLast ? showFinalResults : (isTop5Moment ? showTop5 : () => { state.qIndex++; showCurrentQuestion(); });
      nextBtn.onclick = () => { nextBtn.disabled = true; advance(); };
    }

    function showTop5() {
      const lb = getLeaderboard();
      broadcast({ type: 'top5', leaderboard: lb });
      showScreen('screen-top5');
      buildLeaderboard('top5-leaderboard', lb, 5);
      document.getElementById('btn-top5-next').onclick = () => { state.qIndex++; showCurrentQuestion(); };
    }

    function showFinalResults() {
      const lb = getLeaderboard();
      broadcast({ type: 'gameover', leaderboard: lb });
      showScreen('screen-gameover');
      buildLeaderboard('final-leaderboard', lb);
    }

    // ── Wire up & init ────────────────────────────────────────────────────────
    document.getElementById('btn-start').addEventListener('click', () => {
      clearGameState();
      state.savedScores = new Map();
      const multipleQs  = shuffle(ALL_QUESTIONS).slice(0, 10);
      const yesnoQs     = shuffle(YES_NO_QUESTIONS).slice(0, 5);
      const imageQs     = shuffle(IMAGE_QUESTIONS).slice(0, 5);
      const estimQs     = shuffle(ESTIMATION_QUESTIONS).slice(0, 5);
      state.questions   = [...multipleQs, ...yesnoQs, ...imageQs, ...estimQs];
      state.qIndex      = 0;
      state.players.forEach(p => { p.score = 0; p.correct = 0; p.lastDelta = 0; });
      showCurrentQuestion();
    });

    document.getElementById('btn-kick-all').addEventListener('click', () => {
      if (!confirm('Kick ALL players from the lobby?')) return;
      if (state.playersRef) state.playersRef.remove();
      state.players.clear();
      updatePlayerList();
    });

    document.getElementById('btn-restart').addEventListener('click', () => {
      if (state.gameRef) state.gameRef.remove();
      localStorage.removeItem('quiz-host-pin');
      localStorage.removeItem('quiz-game-state');
      location.reload();
    });

    const _savedRaw = localStorage.getItem('quiz-game-state');
    if (_savedRaw) {
      try {
        const _saved    = JSON.parse(_savedRaw);
        const AGE_LIMIT = 6 * 60 * 60 * 1000;
        if (!_saved.ts || Date.now() - _saved.ts > AGE_LIMIT) {
          clearGameState();
        } else {
          state.savedScores = new Map(_saved.playerScores.map(p => [p.name, p]));
          const btnResume   = document.getElementById('btn-resume');
          btnResume.style.display = '';
          btnResume.addEventListener('click', () => {
            state.questions = _saved.questions;
            state.qIndex    = _saved.nextQIndex;
            state.players.forEach(p => {
              const s = state.savedScores.get(p.name);
              if (s) { p.score = s.score; p.correct = s.correct; }
            });
            showCurrentQuestion();
          });
        }
      } catch (e) { clearGameState(); }
    }

    initFirebase();

    // ── Easter egg: Shift+R → flash correct answer for 1 s ───────────────────
    let _varTimeout = null;
    document.addEventListener('keydown', e => {
      if (!e.shiftKey || e.key !== 'R') return;
      if (!document.getElementById('screen-question').classList.contains('active')) return;
      if (state.revealed || state.questions.length === 0) return;

      const q     = state.questions[state.qIndex];
      const qtype = q.type || 'multiple';
      let answer;
      if (qtype === 'estimate') {
        answer = q.correctAnswer + (q.unit ? ' ' + q.unit : '');
      } else {
        answer = (q.options || [])[q.correctIndex] || '?';
      }

      clearTimeout(_varTimeout);
      broadcast({ type: 'var-hint', answer });
    });
  </script>
