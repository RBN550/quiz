<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Quiz – Play</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-dark: #46178F;
      --purple:      #8B2FC9;
      --red:         #E21B3C;
      --blue:        #1368CE;
      --yellow:      #D89E00;
      --green:       #26890C;
      --white:       #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple));
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
      overflow-y: auto;
    }

    /* ── Screens ─────────────────────────────────────────────────────────── */
    .screen { display: none; width: 100%; max-width: 420px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    /* ── Join ────────────────────────────────────────────────────────────── */
    .card {
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      width: 100%;
      padding: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-radius: 12px;
      background: rgba(255,255,255,.15);
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    input::placeholder { color: rgba(255,255,255,.5); }
    input:focus { border-color: var(--white); }

    .error-msg {
      background: rgba(226,27,60,.4);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: .9rem;
      text-align: center;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      background: var(--white);
      color: var(--purple-dark);
      border: none;
      border-radius: 12px;
      padding: 18px;
      width: 100%;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform .1s, opacity .2s;
    }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .4; cursor: default; transform: none; }

    /* ── Wait ────────────────────────────────────────────────────────────── */
    .wait-icon {
      font-size: 4rem;
      animation: bounce 1.2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .wait-name {
      font-size: 1.6rem;
      font-weight: 900;
    }
    .wait-sub {
      font-size: 1rem;
      opacity: .7;
    }

    /* ── Answer buttons ──────────────────────────────────────────────────── */
    .answer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    #screen-answer.has-image .answer-btn {
      aspect-ratio: 2 / 1;
    }

    .answer-btn {
      border: none;
      border-radius: 16px;
      padding: 0;
      cursor: pointer;
      aspect-ratio: 4 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      transition: transform .1s, opacity .3s, filter .3s;
      user-select: none;
      line-height: 1.2;
      padding: 12px;
      text-align: center;
    }
    .answer-btn:active { transform: scale(.93); }
    .answer-btn .shape { font-size: 1.8rem; }
    .answer-btn:nth-child(1) { background: var(--red); }
    .answer-btn:nth-child(2) { background: var(--blue); }
    .answer-btn:nth-child(3) { background: var(--yellow); }
    .answer-btn:nth-child(4) { background: var(--green); }
    .answer-btn:disabled { cursor: default; }
    .answer-btn.selected { outline: 5px solid var(--white); }
    .answer-btn.dimmed   { opacity: .35; filter: saturate(.4); }

    /* ── Question text ─────────────────────────────────────────────────────── */
    .question-text {
      background: rgba(255,255,255,.15);
      border-radius: 14px;
      padding: 18px 20px;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 800;
      text-align: center;
      width: 100%;
      line-height: 1.3;
    }

    /* ── Timer bar (compact for player) ─────────────────────────────────── */
    .timer-bar-wrap {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,.2);
      border-radius: 999px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: var(--white);
      border-radius: 999px;
      transition: width 1s linear, background .3s;
    }
    .timer-bar.urgent { background: #ff4444; }

    /* ── Feedback ────────────────────────────────────────────────────────── */
    .feedback-icon { font-size: 5rem; }
    .feedback-title { font-size: 2rem; font-weight: 900; }
    .feedback-points { font-size: 1.3rem; opacity: .85; }
    .feedback-total  { font-size: 1rem; opacity: .65; }

    /* ── Answer reveal ───────────────────────────────────────────────────── */
    .answer-reveal {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .answer-reveal-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 700;
    }
    .answer-reveal-row.correct { background: rgba(38,137,12,.55); border: 2px solid rgba(60,220,60,.5); }
    .answer-reveal-row.wrong   { background: rgba(226,27,60,.55);  border: 2px solid rgba(255,80,100,.5); }
    .answer-reveal-row .ar-label {
      font-size: .75rem;
      font-weight: 600;
      opacity: .75;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .answer-reveal-row .ar-text {
      font-size: 1.05rem;
      font-weight: 800;
    }

    /* ── Rank ────────────────────────────────────────────────────────────── */
    .rank-badge {
      background: rgba(255,255,255,.2);
      border-radius: 16px;
      padding: 14px 28px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* ── Leaderboard ─────────────────────────────────────────────────────── */
    .leaderboard { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .lb-row {
      background: rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 1.15rem;
      font-weight: 700;
      animation: slideIn .3s ease both;
    }
    .lb-row:nth-child(1) { background: rgba(255,215,0,.35); font-size: 1.35rem; }
    .lb-row:nth-child(2) { background: rgba(192,192,192,.3); }
    .lb-row:nth-child(3) { background: rgba(205,127,50,.3); }
    .lb-row.highlight { outline: 3px solid rgba(255,255,255,.7); }
    @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .lb-row .rank { width: 32px; text-align: center; font-size: 1.3em; }
    .lb-row .lb-name { flex: 1; }
    .lb-row .lb-score { opacity: .8; }

    /* ── Game over ───────────────────────────────────────────────────────── */
    .final-score {
      font-size: 2.5rem;
      font-weight: 900;
    }

    /* ── Estimation input ────────────────────────────────────────────────── */
    .estimate-wrap {
      grid-column: 1 / -1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .estimate-label {
      font-size: 1rem;
      font-weight: 700;
      opacity: .8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .estimate-input {
      width: 100%;
      padding: 20px;
      border: 2px solid rgba(255,255,255,.4);
      border-radius: 12px;
      background: rgba(255,255,255,.15);
      color: var(--white);
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      outline: none;
      transition: border-color .2s;
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .estimate-input::-webkit-inner-spin-button,
    .estimate-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .estimate-input:focus { border-color: var(--white); }
    .estimate-input::placeholder { color: rgba(255,255,255,.4); font-size: 1.2rem; font-weight: 400; }
    .estimate-input:disabled { opacity: .4; }

    @keyframes redCardIn {
      0%   { transform: translate(-50%,-50%) rotate(-15deg) scale(.3); opacity: 0; }
      60%  { transform: translate(-50%,-50%) rotate(5deg)  scale(1.15); opacity: 1; }
      100% { transform: translate(-50%,-50%) rotate(0deg)  scale(1);   opacity: 1; }
    }

    /* ── VAR hint overlay ──────────────────────────────────────────────── */
    #var-hint {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.85);
      color: #4ade80;
      font-size: 1.3rem;
      font-weight: 900;
      padding: 16px 28px;
      border-radius: 14px;
      border: 2px solid #4ade80;
      z-index: 9999;
      text-align: center;
      pointer-events: none;
      letter-spacing: .5px;
    }
    #var-hint .var-label {
      font-size: .65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: 6px;
    }

    /* ── Host-disconnected overlay ────────────────────────────────────────── */
    #overlay-disconnected {
      display: none; position: fixed; inset: 0;
      background: rgba(70,23,143,.97); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; padding: 24px; text-align: center;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #reconnect-dots { font-size: 2rem; letter-spacing: 8px; animation: pulse 1.5s ease-in-out infinite; }

    h1 { font-size: 1.8rem; font-weight: 900; text-align: center; }
    h2 { font-size: 1.4rem; font-weight: 800; text-align: center; }

    /* ── Explanation ─────────────────────────────────────────────────────── */
    .explanation-box {
      background: rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: .88rem;
      line-height: 1.5;
      width: 100%;
      text-align: left;
    }
  </style>
</head>
<body>

  <!-- JOIN -->
  <div id="screen-join" class="screen active">
    <h1>Quiz</h1>
    <div class="card">
      <input id="input-pin"  type="tel"  placeholder="Enter game PIN"  maxlength="10" />
      <input id="input-name" type="text" placeholder="Your nickname"      maxlength="20" />
      <div class="error-msg" id="error-msg"></div>
      <button class="btn" id="btn-join">Join</button>
    </div>
  </div>

  <!-- WAITING FOR HOST -->
  <div id="screen-wait" class="screen">
    <div class="wait-icon">🎮</div>
    <div class="wait-name" id="wait-name"></div>
    <div class="wait-sub">Waiting for the host…</div>
  </div>

  <!-- ANSWERING -->
  <div id="screen-answer" class="screen" style="position:relative">
    <div style="width:100%">
      <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
        <span id="timer-display" style="font-size:.85rem;font-weight:700;opacity:.75"></span>
      </div>
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
    </div>
    <div class="question-text" id="question-text"></div>
    <img id="question-image" style="display:none;width:100%;height:200px;object-fit:contain;border-radius:12px;background:rgba(255,255,255,.9);" referrerpolicy="no-referrer" />
    <div class="answer-grid" id="answer-grid"></div>
  </div>

  <!-- FEEDBACK (after answering) -->
  <div id="screen-feedback" class="screen">
    <div class="feedback-icon" id="feedback-icon"></div>
    <div class="feedback-title" id="feedback-title"></div>
    <div class="answer-reveal" id="answer-reveal"></div>
    <div class="explanation-box" id="feedback-explanation" style="display:none"></div>
    <div class="feedback-points" id="feedback-points"></div>
    <div class="feedback-total" id="feedback-total"></div>
  </div>

  <!-- TOP 5 -->
  <div id="screen-top5" class="screen">
    <h1>🏅 Top 5</h1>
    <div class="leaderboard" id="top5-leaderboard"></div>
    <div class="rank-badge" id="top5-myrank"></div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="screen">
    <h1>🏆 Game over!</h1>
    <h2 id="gameover-name"></h2>
    <div class="final-score" id="final-score"></div>
    <div style="opacity:.7; font-size:.9rem">Total points</div>
    <div class="leaderboard" id="gameover-leaderboard"></div>
    <button class="btn">New game</button>
  </div>

  <!-- Red card overlay -->
  <div id="red-card" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9rem;z-index:99999;pointer-events:none;animation:redCardIn .5s ease both">🟥</div>

  <!-- VAR hint overlay -->
  <div id="var-hint"><div class="var-label">📹 VAR Check</div><div id="var-hint-text"></div></div>

  <!-- HOST DISCONNECTED OVERLAY -->
  <div id="overlay-disconnected">
    <div style="font-size:4rem">📡</div>
    <h2>Connection lost</h2>
    <p style="opacity:.75;max-width:280px">Trying to reconnect automatically…</p>
    <div id="reconnect-dots">● ● ●</div>
    <button class="btn">Leave game</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    // ── Firebase ──────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyAPeGzcZ_aKwt3kIO7PwwPE8JQj46iu_5U",
      authDomain:        "happyhour-quiz.firebaseapp.com",
      databaseURL:       "https://happyhour-quiz-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "happyhour-quiz",
      storageBucket:     "happyhour-quiz.firebasestorage.app",
      messagingSenderId: "432591844207",
      appId:             "1:432591844207:web:85806de47546bfdaa0ae9a",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ── Constants & State ───────────────────────────────────────────────────
    const SHAPES = ['▲', '◆', '●', '■'];

    const state = {
      myName:        '',
      myUid:         null,
      myScore:       0,
      hasAnswered:   false,
      timerInterval: null,
      timeLeft:      0,
      totalTime:     0,
      connectedPin:  null,
      playerRef:     null,
      broadcastRef:  null,
      lastBroadcastTs: 0,
      currentQIdx:          -1,
      currentOptions:       [],
      selectedAnswerIndex:  null,
      selectedEstimate:     null,
      currentUnit:          '',
    };

    // ── UI ────────────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function buildLeaderboard(containerId, lb, limit, myName) {
      const el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = '';
      lb.slice(0, limit).forEach((entry, i) => {
        const row = document.createElement('div');
        row.className = 'lb-row' + (entry.name === myName ? ' highlight' : '');
        row.style.animationDelay = `${i * 80}ms`;
        const medal = entry.rank === 1 ? '🥇' : entry.rank === 2 ? '🥈' : entry.rank === 3 ? '🥉' : entry.rank + '.';
        const deltaHtml = entry.delta > 0
          ? ` <span style="color:#4ade80;font-size:.85em;margin-left:4px">+${entry.delta}</span>`
          : '';
        row.innerHTML = `<span class="rank">${medal}</span><span class="lb-name">${entry.name}</span>${deltaHtml}<span class="lb-score">${entry.score} pts</span>`;
        el.appendChild(row);
      });
    }

    // ── Timer ─────────────────────────────────────────────────────────────────
    function startTimer(seconds, onEnd, totalTime) {
      clearInterval(state.timerInterval);
      state.timeLeft  = seconds;
      state.totalTime = totalTime || seconds;
      updateTimerUI();
      state.timerInterval = setInterval(() => {
        state.timeLeft--;
        updateTimerUI();
        if (state.timeLeft <= 0) {
          clearInterval(state.timerInterval);
          if (onEnd) onEnd();
        }
      }, 1000);
    }

    function updateTimerUI() {
      const pct = (state.timeLeft / state.totalTime) * 100;
      const bar = document.getElementById('timer-bar');
      if (bar) {
        bar.style.width = pct + '%';
        bar.classList.toggle('urgent', state.timeLeft <= 5);
      }
      const disp = document.getElementById('timer-display');
      if (disp) disp.textContent = state.timeLeft + 's';
    }

    // ── Session persistence ──────────────────────────────────────────────────
    const _SESSION_KEY = 'quiz-player-session';
    const _SESSION_AGE = 6 * 60 * 60 * 1000; // 6 h

    function savePlayerSession() {
      if (!state.connectedPin || !state.myName) return;
      localStorage.setItem(_SESSION_KEY, JSON.stringify({
        ts:    Date.now(),
        pin:   state.connectedPin,
        name:  state.myName,
        uid:   state.myUid,
        score: state.myScore,
      }));
    }

    function clearPlayerSession() {
      localStorage.removeItem(_SESSION_KEY);
    }

    function loadPlayerSession() {
      try {
        const raw = localStorage.getItem(_SESSION_KEY);
        if (!raw) return null;
        const s = JSON.parse(raw);
        if (!s.ts || Date.now() - s.ts > _SESSION_AGE) { clearPlayerSession(); return null; }
        return s;
      } catch (e) { return null; }
    }

    // Pre-fill form if a recent session exists
    (function restoreForm() {
      const s = loadPlayerSession();
      if (!s) return;
      document.getElementById('input-pin').value  = s.pin;
      document.getElementById('input-name').value = s.name;
    })();

    // ── Firebase join ─────────────────────────────────────────────────────────
    function doJoin() {
      const pin  = document.getElementById('input-pin').value.trim();
      const name = document.getElementById('input-name').value.trim();
      document.getElementById('error-msg').classList.remove('visible');

      if (!pin)  { showError('Please enter a PIN.');  return; }
      if (!name) { showError('Please enter a name.'); return; }

      state.myName = name;

      // Reuse saved session if pin+name match (reconnect scenario)
      const _prevSession = loadPlayerSession();
      if (_prevSession && _prevSession.pin === pin && _prevSession.name === name) {
        state.myUid   = _prevSession.uid;
        state.myScore = _prevSession.score;
      } else {
        state.myUid   = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        state.myScore = 0;
      }

      const btnJoin = document.getElementById('btn-join');
      btnJoin.disabled    = true;
      btnJoin.textContent = 'Connecting…';

      // Timeout fallback
      state.joinTimeout = setTimeout(() => {
        btnJoin.disabled    = false;
        btnJoin.textContent = 'Join';
        showError('Timeout. Please try again.');
      }, 15000);

      // Check if the game/PIN exists
      const gameRef = db.ref('games/' + pin);
      gameRef.once('value').then(snap => {
        if (!snap.exists()) {
          clearTimeout(state.joinTimeout);
          btnJoin.disabled    = false;
          btnJoin.textContent = 'Join';
          showError('PIN not found. Please check and try again.');
          return;
        }

        state.connectedPin = pin;
        state.playerRef    = db.ref('games/' + pin + '/players/' + state.myUid);
        state.broadcastRef = db.ref('games/' + pin + '/broadcast');

        // Register player
        state.playerRef.set({ name: state.myName, score: state.myScore }).then(() => {
          state.playerRef.onDisconnect().remove();
          clearTimeout(state.joinTimeout);
          savePlayerSession();
          document.getElementById('wait-name').textContent = state.myName;
          showScreen('screen-wait');
          listenForBroadcasts();
        }).catch(() => {
          btnJoin.disabled    = false;
          btnJoin.textContent = 'Join';
          showError('Could not join. Please try again.');
        });

      }).catch(() => {
        clearTimeout(state.joinTimeout);
        btnJoin.disabled    = false;
        btnJoin.textContent = 'Join';
        showError('Connection error. Please try again.');
      });
    }

    function listenForBroadcasts() {
      if (!state.broadcastRef) return;
      state.broadcastRef.on('value', snap => {
        const data = snap.val();
        if (!data) return;
        // Ignore old messages (before we joined)
        const ts = data._ts || 0;
        if (ts < state.lastBroadcastTs) return;
        state.lastBroadcastTs = ts;
        handleHostMsg(data);
      });
    }

    // ── Answer submission ─────────────────────────────────────────────────────
    function sendAnswer(index, clickedBtn) {
      if (state.hasAnswered || !state.playerRef) return;
      state.hasAnswered        = true;
      state.selectedAnswerIndex = index;
      clearInterval(state.timerInterval);

      state.playerRef.update({ answerIndex: index, timeRemaining: state.timeLeft, answerPending: true, qIdx: state.currentQIdx, estimate: null });

      document.querySelectorAll('.answer-btn').forEach(b => {
        b.disabled = true;
        if (b === clickedBtn) b.classList.add('selected');
        else                  b.classList.add('dimmed');
      });

      document.getElementById('feedback-icon').textContent   = '⏳';
      document.getElementById('feedback-title').textContent  = 'Answer submitted!';
      document.getElementById('feedback-points').textContent = 'Waiting for reveal…';
      document.getElementById('feedback-total').textContent  = '';
      document.getElementById('answer-reveal').innerHTML     = '';
      document.getElementById('answer-reveal').style.display = 'none';
      document.getElementById('feedback-explanation').style.display = 'none';
      showScreen('screen-feedback');
    }

    function sendEstimate(value, inp, sub) {
      if (state.hasAnswered || !state.playerRef) return;
      state.hasAnswered     = true;
      state.selectedEstimate = value;
      clearInterval(state.timerInterval);
      inp.disabled = true;
      sub.disabled = true;

      state.playerRef.update({ estimate: value, timeRemaining: state.timeLeft, answerPending: true, qIdx: state.currentQIdx, answerIndex: null });

      document.getElementById('feedback-icon').textContent   = '⏳';
      document.getElementById('feedback-title').textContent  = 'Estimate submitted!';
      document.getElementById('feedback-points').textContent = `Your guess: ${state.currentUnit ? value.toLocaleString() : value}`;
      document.getElementById('feedback-total').textContent  = 'Waiting for reveal…';
      document.getElementById('answer-reveal').innerHTML     = '';
      document.getElementById('answer-reveal').style.display = 'none';
      document.getElementById('feedback-explanation').style.display = 'none';
      showScreen('screen-feedback');
    }

    // ── Game ──────────────────────────────────────────────────────────────────
    function handleHostMsg(data) {
      if (data.type === 'question') {
        state.hasAnswered = false;
        showQuestion(data);
      }
      if (data.type === 'reveal') {
        clearInterval(state.timerInterval);
        showFeedback(data);
      }
      if (data.type === 'top5') {
        clearInterval(state.timerInterval);
        showTop5(data);
      }
      if (data.type === 'gameover') {
        clearInterval(state.timerInterval);
        showGameover(data);
      }
      if (data.type === 'var-hint') {
        const hint = document.getElementById('var-hint');
        document.getElementById('var-hint-text').textContent = data.answer;
        hint.style.display = 'block';
        setTimeout(() => { hint.style.display = 'none'; }, 62);
      }
    }

    function showQuestion(data) {
      state.currentQIdx         = data.index;
      state.currentOptions      = data.options || [];
      state.selectedAnswerIndex = null;
      state.selectedEstimate    = null;
      showScreen('screen-answer');
      const qtype = data.qtype || 'multiple';
      document.getElementById('question-text').textContent = data.question || '';
      const imgEl = document.getElementById('question-image');
      if (qtype === 'image' && data.image) { imgEl.src = data.image; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; imgEl.src = ''; }
      const grid = document.getElementById('answer-grid');
      grid.innerHTML = '';

      if (qtype === 'estimate') {
        state.currentUnit = data.unit || '';
        grid.style.gridTemplateColumns = '1fr';
        const wrap  = document.createElement('div');
        wrap.className = 'estimate-wrap';
        const lbl   = document.createElement('div');
        lbl.className   = 'estimate-label';
        lbl.textContent = '🔢 Type your number estimate';
        const inp   = document.createElement('input');
        inp.type        = 'number';
        inp.className   = 'estimate-input';
        inp.placeholder = 'Enter a number…';
        inp.id          = 'estimate-input';
        inp.inputMode   = 'numeric';
        const sub   = document.createElement('button');
        sub.className   = 'btn';
        sub.textContent = 'Submit';
        const doSubmit = () => {
          const val = Math.round(parseFloat(inp.value));
          if (!isNaN(val)) sendEstimate(val, inp, sub);
        };
        sub.addEventListener('click', doSubmit);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit(); });
        wrap.appendChild(lbl);
        wrap.appendChild(inp);
        wrap.appendChild(sub);
        grid.appendChild(wrap);
        { const elapsed = data._startedAt ? Math.floor((Date.now() - data._startedAt) / 1000) : 0;
          const startFrom = Math.max(1, data.timeLimit - elapsed);
          startTimer(startFrom, () => { inp.disabled = true; sub.disabled = true; }, data.timeLimit); }
      } else {
        grid.style.gridTemplateColumns = '';
        const icons = SHAPES;
        data.options.forEach((opt, i) => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.innerHTML = `<span class="shape">${icons[i]}</span><span>${opt}</span>`;
          btn.addEventListener('click', () => sendAnswer(i, btn));
          grid.appendChild(btn);
        });
        { const elapsed = data._startedAt ? Math.floor((Date.now() - data._startedAt) / 1000) : 0;
          const startFrom = Math.max(1, data.timeLimit - elapsed);
          startTimer(startFrom, () => { document.querySelectorAll('#answer-grid .answer-btn').forEach(b => b.disabled = true); }, data.timeLimit); }
      }
    }

    function renderAnswerReveal(revealEl, data, isCorrect) {
      if (!revealEl) return;
      const correctIndex = data.correctIndex;
      if (correctIndex === null || correctIndex === undefined || !state.currentOptions.length) {
        revealEl.innerHTML = '';
        revealEl.style.display = 'none';
        return;
      }
      const correctText = state.currentOptions[correctIndex] || '';
      let html = '';
      if (!isCorrect && state.selectedAnswerIndex !== null && state.selectedAnswerIndex !== correctIndex) {
        const selectedText = state.currentOptions[state.selectedAnswerIndex] || '';
        html += `<div class="answer-reveal-row wrong"><span class="ar-label">Your answer</span><span class="ar-text">${selectedText}</span></div>`;
      }
      html += `<div class="answer-reveal-row correct"><span class="ar-label">Correct answer</span><span class="ar-text">${correctText}</span></div>`;
      revealEl.innerHTML = html;
      revealEl.style.display = 'flex';
    }

    function showFeedback(data) {
      const revealEl = document.getElementById('answer-reveal');

      if (!state.hasAnswered) {
        document.getElementById('feedback-icon').textContent   = '⏱️';
        document.getElementById('feedback-title').textContent  = "Time's up!";
        document.getElementById('feedback-points').textContent = '0 points';
        document.getElementById('feedback-total').textContent  = '';
        state.hasAnswered = true;
      if (data.qtype === 'estimate' && data.correctAnswer !== undefined && data.correctAnswer !== null) {
        const unitStr = data.unit ? ' ' + data.unit : '';
        revealEl.innerHTML = `<div class="answer-reveal-row correct"><span class="ar-label">Correct answer</span><span class="ar-text">${Number(data.correctAnswer).toLocaleString()}${unitStr}</span></div>`;
        revealEl.style.display = 'flex';
      } else {
        renderAnswerReveal(revealEl, data, false);
      }
      } else {
        const me    = (data.leaderboard || []).find(p => p.name === state.myName);
        const delta = me ? me.delta : 0;
        state.myScore = me ? me.score : state.myScore;
        savePlayerSession();

        if (data.qtype === 'estimate') {
          const correct   = data.correctAnswer;
          const unitStr   = data.unit ? ' ' + data.unit : '';
          const gotPoints  = delta > 0;
          const isExact    = gotPoints && state.selectedEstimate !== null && Number(state.selectedEstimate) === Number(data.correctAnswer);
          document.getElementById('feedback-icon').textContent   = isExact ? '🏆' : gotPoints ? '🎯' : '💫';
          document.getElementById('feedback-title').textContent  = isExact ? 'Perfect!' : gotPoints ? 'Close enough!' : 'Too far off!';
          document.getElementById('feedback-points').textContent = gotPoints ? `+${delta} points` : '0 points';
          document.getElementById('feedback-total').textContent  = `Total: ${state.myScore} points`;
          if (revealEl) {
            let html = '';
            if (correct !== undefined && correct !== null) {
              html += `<div class="answer-reveal-row correct"><span class="ar-label">Correct answer</span><span class="ar-text">${unitStr ? Number(correct).toLocaleString() : Number(correct)}${unitStr}</span></div>`;
            }
            if (state.selectedEstimate !== null) {
              html += `<div class="answer-reveal-row ${gotPoints ? 'correct' : 'wrong'}"><span class="ar-label">Your guess</span><span class="ar-text">${unitStr ? state.selectedEstimate.toLocaleString() : state.selectedEstimate}${unitStr}</span></div>`;
            }
            revealEl.innerHTML = html;
            revealEl.style.display = html ? 'flex' : 'none';
          }
        } else {
          const isCorrect = delta > 0;
          document.getElementById('feedback-icon').textContent   = isCorrect ? '✅' : '❌';
          document.getElementById('feedback-title').textContent  = isCorrect ? 'Correct!' : 'Wrong!';
          document.getElementById('feedback-points').textContent = isCorrect ? `+${delta} points` : '0 points';
          document.getElementById('feedback-total').textContent  = `Total: ${state.myScore} points`;
          renderAnswerReveal(revealEl, data, isCorrect);
          if (!isCorrect && state.myName.toLowerCase() === 'referee') {
            const rc = document.getElementById('red-card');
            rc.style.animation = 'none'; void rc.offsetWidth; rc.style.animation = '';
            rc.style.display = 'block';
            setTimeout(() => { rc.style.display = 'none'; }, 1500);
          }
        }
      }
      const explEl = document.getElementById('feedback-explanation');
      if (data.explanation) { explEl.textContent = '💡 ' + data.explanation; explEl.style.display = ''; }
      else { explEl.style.display = 'none'; }
      showScreen('screen-feedback');
    }

    function showTop5(data) {
      const lb = data.leaderboard || [];
      buildLeaderboard('top5-leaderboard', lb, 5, state.myName);
      const me     = lb.find(p => p.name === state.myName);
      const rankEl = document.getElementById('top5-myrank');
      rankEl.textContent = me ? `You: Rank ${me.rank} · ${me.score} pts` : '';
      showScreen('screen-top5');
    }

    function showGameover(data) {
      const me = (data.leaderboard || []).find(p => p.name === state.myName);
      if (me) state.myScore = me.score;
      clearPlayerSession();
      document.getElementById('gameover-name').textContent = state.myName;
      document.getElementById('final-score').textContent   = state.myScore + ' points';
      buildLeaderboard('gameover-leaderboard', data.leaderboard || [], 10, state.myName);
      showScreen('screen-gameover');
    }

    // ── Wire up ────────────────────────────────────────────────────────────────
    document.getElementById('btn-join').addEventListener('click', doJoin);
    document.getElementById('input-pin').addEventListener('keydown',  e => e.key === 'Enter' && doJoin());
    document.getElementById('input-name').addEventListener('keydown', e => e.key === 'Enter' && doJoin());

    document.querySelector('#screen-gameover .btn').addEventListener('click', () => location.reload());
    document.querySelector('#overlay-disconnected .btn').addEventListener('click', () => location.reload());

    // ── Easter egg: Konami Code → Konfetti ───────────────────────────────────
    const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    let _konamiIdx = 0;
    document.addEventListener('keydown', e => {
      if (e.key === KONAMI[_konamiIdx]) {
        _konamiIdx++;
        if (_konamiIdx === KONAMI.length) {
          _konamiIdx = 0;
          launchConfetti();
        }
      } else {
        _konamiIdx = e.key === KONAMI[0] ? 1 : 0;
      }
    });

    function launchConfetti() {
      const colors = ['#E21B3C','#1368CE','#D89E00','#26890C','#ffffff','#FFD700'];
      const count  = 120;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        const size = 8 + Math.random() * 8;
        el.style.cssText = [
          'position:fixed',
          `left:${Math.random() * 100}vw`,
          'top:-20px',
          `width:${size}px`,
          `height:${size}px`,
          `background:${colors[Math.floor(Math.random() * colors.length)]}`,
          `border-radius:${Math.random() > .5 ? '50%' : '2px'}`,
          'z-index:99999',
          'pointer-events:none',
          `transform:rotate(${Math.random()*360}deg)`,
          'transition:none',
        ].join(';');
        document.body.appendChild(el);
        const duration = 1200 + Math.random() * 1200;
        const drift    = (Math.random() - .5) * 120;
        el.animate([
          { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 1 },
          { transform: `translateY(110vh) translateX(${drift}px) rotate(${360 + Math.random()*360}deg)`, opacity: 0 }
        ], { duration, easing: 'ease-in', fill: 'forwards' }).onfinish = () => el.remove();
      }

      const banner = document.createElement('div');
      banner.textContent = '⚽ GOAL!';
      banner.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.5rem;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(0,0,0,.8);z-index:99999;pointer-events:none;animation:konamiBanner .9s ease both';
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 900);
    }

    const _konamiStyle = document.createElement('style');
    _konamiStyle.textContent = '@keyframes konamiBanner{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}';
    document.head.appendChild(_konamiStyle);
  </script>
</body>
</html>
